<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nube de Palabras</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="display-page">

  <!-- Barra superior -->
  <header id="header">
    <h1 id="question-text" class="hidden"></h1>
    <button id="btn-new" class="btn-new hidden">NEW</button>

    <!-- Formulario de pregunta -->
    <div id="question-form" class="question-form">
      <input type="text" id="question-input" placeholder="Escribí la pregunta..." autocomplete="off">
      <button id="btn-accept" class="btn-accept">Aceptar</button>
      <button id="btn-cancel" class="btn-cancel" disabled>Cancelar</button>
    </div>
  </header>

  <!-- Contenido principal -->
  <main id="main-content" class="hidden">
    <div id="qr-container">
      <div id="qr-code"></div>
      <p id="qr-url" class="qr-url"></p>
    </div>
    <div id="cloud-container">
      <canvas id="word-cloud"></canvas>
    </div>
  </main>

  <!-- Mensaje inicial -->
  <div id="waiting-message" class="hidden">
    <p>Configurá una pregunta para comenzar</p>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/wordcloud@1.2.2/src/wordcloud2.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/display.js"></script>
</body>
</html>
